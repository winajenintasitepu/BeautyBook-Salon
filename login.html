<!DOCTYPE html>
<html>
<head>
    <title>Login Admin</title>

    <style>

    body{
        margin:0;
        font-family:Segoe UI;
        background:linear-gradient(135deg,#dff4ff,#b7dcff);
    }

    .login-box{
        width:350px;
        margin:120px auto;
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,.1);
    }

    h2{
        text-align:center;
        color:#4b7bec;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ddd;
        border-radius:10px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        background:#4b7bec;
        color:white;
        border-radius:10px;
        cursor:pointer;
    }

    button:hover{
        background:#3867d6;
    }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Login Admin</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
