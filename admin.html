<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Admin</title>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#eef6ff;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:220px;
    height:100%;
    background:#4b7bec;
    color:white;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#3867d6;
}

.main{
    margin-left:220px;
    padding:20px;
}

.card{
    width:250px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

.card h1{
    color:#4b7bec;
    margin:0;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th{
    background:#74b9ff;
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

.btn{
    background:red;
    color:white;
    text-decoration:none;
    padding:5px 10px;
    border-radius:5px;
}

</style>

</head>
<body>

<div class="sidebar">

    <h2>BeautyBook</h2>

    <a href="/admin">Dashboard</a>

    <a href="/logout">Logout</a>

</div>

<div class="main">

    <div class="card">
        <h1>{{ total }}</h1>
        <p>Total Booking</p>
    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>Telepon</th>
            <th>Layanan</th>
            <th>Tanggal</th>
            <th>Jam</th>
            <th>Catatan</th>
            <th>Aksi</th>
        </tr>

        {% for d in data %}

        <tr>

            <td>{{ d[0] }}</td>
            <td>{{ d[1] }}</td>
            <td>{{ d[2] }}</td>
            <td>{{ d[3] }}</td>
            <td>{{ d[4] }}</td>
            <td>{{ d[5] }}</td>
            <td>{{ d[6] }}</td>

            <td>
                <a href="/hapus/{{ d[0] }}" class="btn">
                    Hapus
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
